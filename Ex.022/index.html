<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundos</title>
    <style>


        *{ box-sizing: border-box; }

        body{
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #c2c3c5;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            padding: 24px;
        }



        h1{
            font-size: 1.5em;
            margin: 0 0 4px;
        }

        p.subtitle{
            margin: 0 0 24px;
            color: var(--text-dim);
            font-size: .9em;
        }

        nav{
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        a{
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text);
            background: #fafafb;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: .95em;
            transition: background-color .2s ease, border-color .2s ease, transform .2s ease, color .2s ease;
        }

    </style>
</head>
